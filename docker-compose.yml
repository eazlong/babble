services:
  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]

  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linguaquest
    ports: ["5433:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  # F5-TTS runs locally on Mac via MLX (not Docker-compatible on ARM64)
  # Start manually: .venv/bin/python services/f5-tts-server/main.py
  # f5-tts:
  #   build: ./services/f5-tts-server
  #   ports: ["8002:8002"]
  #   environment:
  #     F5_STEPS: 2
  #     F5_METHOD: euler

  dialogue-service:
    build: ./services/dialogue-service
    ports: ["8302:8302"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/linguaquest
      REDIS_URL: redis://redis:6379
    depends_on: [postgres, redis]

  voice-service:
    build: ./services/voice-service
    ports: ["8301:8301"]
    env_file:
      - ./services/voice-service/.env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      FISH_SPEECH_URL: ${FISH_SPEECH_URL:-http://host.docker.internal:8002}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
    volumes:
      - whisper_cache:/models/whisper
    depends_on: [redis]

  spirit-coach-service:
    build: ./services/spirit-coach-service
    ports: ["8305:8305"]
    environment:
      REDIS_URL: redis://redis:6379
    depends_on: [redis]

volumes:
  pgdata:
  whisper_cache:
